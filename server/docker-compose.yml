version: '3.8'

services:
  like-content-sync:
    build: .
    ports:
      - "8082:3000"
    volumes:
      - ./notes:/data/notes
    environment:
      - PORT=3000
      - DATA_DIR=/data/notes
      - API_KEYS=${API_KEYS:-default-key-change-me}
      # Memos 同步配置（可选）
      - MEMOS_URL=${MEMOS_URL:-}
      - MEMOS_TOKEN=${MEMOS_TOKEN:-}
      # 服务器公网地址（用于图片 URL）
      - SERVER_URL=${SERVER_URL:-}
      # 七牛云图片存储配置（可选）
      - QINIU_ACCESS_KEY=${QINIU_ACCESS_KEY:-}
      - QINIU_SECRET_KEY=${QINIU_SECRET_KEY:-}
      - QINIU_BUCKET=${QINIU_BUCKET:-}
      - QINIU_DOMAIN=${QINIU_DOMAIN:-}
    restart: unless-stopped